name: ssh-terraform
description: >
  Copies all files from current working dir to a remote ssh server.
  Then logs in to the ssh server & creates a Terraform plan.
  Then does Terraform Apply if not in a dry-run mode.

inputs:
  LocalPath:
    description: Source folder of the files to copy to remote server
    required: true
  RemotePath:
    description: Target folder on the remote server
    required: true
  DryRun:
    description: Instructs TF to Plan & Apply or just do the Plan
    required: false
    default: 'false'
  Token:
    required: false
    description: >
      Personal access token (PAT) used to fetch the repository. The PAT is configured
      with the local git config, which enables your scripts to run authenticated git
      commands. The post-job step removes the PAT.
      Use a service account with the least permissions necessary.
      Also when generating a new PAT, select the least scopes necessary.
      [Learn more about creating and using encrypted secrets](https://help.github.com/en/actions/automating-your-workflow-with-github-actions/creating-and-using-encrypted-secrets)
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v3
      with:
        submodules: recursive
        fetch-depth: 0
        ref: ${{ github.head_ref }}
        token: ${{ inputs.Token }}

    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.GHA_SSH_PRIVATE_KEY }}
        known_hosts: unnecessary

    - name: Adding Known Hosts
      run: ssh-keyscan -p ${{ secrets.TEL_SSH_PORT}} -H ${{ secrets.TEL_SSH_HOST }}  >> ~/.ssh/known_hosts

    - name: Copy default variables
      run: cp ./variables/default.tfvars ./components/host/lxd/default.auto.tfvars

    - name: Install rsync
      run: sudo apt-get install rsync

    - name: Create remote folder if not exists
      run: ssh -p ${{ secrets.TEL_SSH_PORT }} ${{ secrets.TEL_SSH_USER }}@${{ secrets.TEL_SSH_HOST }} "mkdir -p ${{ inputs.RemotePath }}"

    - name: Copy with rsync to remote
      run: rsync -avz -e "ssh -p ${{ secrets.TEL_SSH_PORT }}" ${{ inputs.LocalPath }} ${{ secrets.TEL_SSH_USER }}@${{ secrets.TEL_SSH_HOST }}:${{ inputs.RemotePath }}

    - name: Terraform Plan
      uses: fifsky/ssh-action@v0.0.6
      with:
        host: ${{ secrets.TEL_SSH_HOST }}
        user: ${{ secrets.TEL_SSH_USER }}
        key: ${{ secrets.GHA_SSH_PRIVATE_KEY }}
        command: |
          cd ${{ inputs.RemotePath }}
          terraform init -upgrade
          terraform plan -out tf-plan.out

    - name: Terraform Apply
      uses: fifsky/ssh-action@v0.0.6
      if: ${{ inputs.DryRun == 'false' }}
      with:
        host: ${{ secrets.TEL_SSH_HOST }}
        user: ${{ secrets.TEL_SSH_USER }}
        key: ${{ secrets.GHA_SSH_PRIVATE_KEY }}
        command: |
          cd ${{ inputs.RemotePath }}
          terraform apply "tf-plan.out"
